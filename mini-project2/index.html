<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>
    <meta name="description" content="A modern personal finance tracker to manage income and expenses with visual insights.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0b0b1e;
            --card: rgba(18, 18, 45, 0.8);
            --card-border: rgba(255, 255, 255, 0.06);
            --income: #34d399;
            --income-bg: rgba(52, 211, 153, 0.12);
            --expense: #f472b6;
            --expense-bg: rgba(244, 114, 182, 0.12);
            --accent: #818cf8;
            --text: rgba(255, 255, 255, 0.9);
            --text-dim: rgba(255, 255, 255, 0.4);
            --text-mid: rgba(255, 255, 255, 0.6);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -40%;
            right: -20%;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(129, 140, 248, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: floatOrb 20s ease-in-out infinite;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            left: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(52, 211, 153, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            animation: floatOrb 25s ease-in-out infinite reverse;
            z-index: 0;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-40px, 30px); }
        }

        .app {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 6px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .summary-card {
            background: var(--card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .summary-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .summary-card .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .summary-card .value {
            font-size: 28px;
            font-weight: 700;
        }

        .summary-card.income .value { color: var(--income); }
        .summary-card.expense .value { color: var(--expense); }
        .summary-card.balance .value { color: var(--accent); }

        .summary-card .icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        /* Main Content */
        .content {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 24px;
        }

        /* Add Transaction Form */
        .add-panel {
            background: var(--card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 28px;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .add-panel h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text);
        }

        .type-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 4px;
        }

        .type-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            background: transparent;
            color: var(--text-dim);
        }

        .type-btn.active-income {
            background: var(--income-bg);
            color: var(--income);
            box-shadow: 0 4px 15px rgba(52, 211, 153, 0.2);
        }

        .type-btn.active-expense {
            background: var(--expense-bg);
            color: var(--expense);
            box-shadow: 0 4px 15px rgba(244, 114, 182, 0.2);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.2s;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.15);
        }

        .form-group input::placeholder { color: var(--text-dim); }

        .form-group select option { background: #1a1a3e; }

        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            color: #fff;
            margin-top: 4px;
        }

        .submit-btn.income-btn {
            background: linear-gradient(135deg, #34d399, #10b981);
            box-shadow: 0 4px 20px rgba(52, 211, 153, 0.3);
        }
        .submit-btn.income-btn:hover { box-shadow: 0 8px 30px rgba(52, 211, 153, 0.5); transform: translateY(-2px); }

        .submit-btn.expense-btn {
            background: linear-gradient(135deg, #f472b6, #ec4899);
            box-shadow: 0 4px 20px rgba(244, 114, 182, 0.3);
        }
        .submit-btn.expense-btn:hover { box-shadow: 0 8px 30px rgba(244, 114, 182, 0.5); transform: translateY(-2px); }

        /* Transactions List */
        .transactions-panel {
            background: var(--card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 28px;
        }

        .transactions-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .transactions-header h2 {
            font-size: 16px;
            font-weight: 600;
        }

        .filter-pills {
            display: flex;
            gap: 6px;
        }

        .filter-pill {
            padding: 6px 14px;
            border: none;
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
        }

        .filter-pill.active {
            background: rgba(129, 140, 248, 0.2);
            color: var(--accent);
        }

        .filter-pill:hover { background: rgba(255, 255, 255, 0.1); }

        .transaction-list {
            list-style: none;
            max-height: 440px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.08) transparent;
        }

        .transaction-list::-webkit-scrollbar { width: 4px; }
        .transaction-list::-webkit-scrollbar-track { background: transparent; }
        .transaction-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

        .transaction-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-radius: 14px;
            margin-bottom: 6px;
            transition: all 0.2s ease;
            animation: fadeSlideIn 0.4s ease;
        }

        .transaction-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .transaction-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .transaction-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .transaction-icon.income-icon { background: var(--income-bg); }
        .transaction-icon.expense-icon { background: var(--expense-bg); }

        .transaction-category {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
        }

        .transaction-type {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .transaction-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .transaction-amount {
            font-size: 16px;
            font-weight: 600;
            text-align: right;
        }

        .transaction-amount.income-amt { color: var(--income); }
        .transaction-amount.expense-amt { color: var(--expense); }

        .delete-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: all 0.2s;
            font-size: 14px;
            opacity: 0;
        }

        .transaction-item:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: var(--expense); background: var(--expense-bg); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-state span {
            font-size: 48px;
            display: block;
            margin-bottom: 16px;
        }

        .empty-state p { font-size: 14px; }

        @media (max-width: 768px) {
            .summary-grid { grid-template-columns: 1fr; }
            .content { grid-template-columns: 1fr; }
            .add-panel { position: static; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>💰 Finance Tracker</h1>
            <p>Mini Project 2</p>
        </div>

        <div class="summary-grid">
            <div class="summary-card income">
                <div class="icon">📈</div>
                <div class="label">Total Income</div>
                <div class="value" id="totalIncome">₹0</div>
            </div>
            <div class="summary-card expense">
                <div class="icon">📉</div>
                <div class="label">Total Expense</div>
                <div class="value" id="totalExpense">₹0</div>
            </div>
            <div class="summary-card balance">
                <div class="icon">💎</div>
                <div class="label">Balance</div>
                <div class="value" id="balance">₹0</div>
            </div>
        </div>

        <div class="content">
            <div class="add-panel">
                <h2>Add Transaction</h2>
                <div class="type-toggle">
                    <button class="type-btn active-income" id="incomeBtn" onclick="setType('income')">↑ Income</button>
                    <button class="type-btn" id="expenseBtn" onclick="setType('expense')">↓ Expense</button>
                </div>
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" id="amount" placeholder="Enter amount..." min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="category">
                        <option value="" disabled selected>Select category</option>
                        <optgroup label="Income" id="incomeCategories">
                            <option value="Salary">💼 Salary</option>
                            <option value="Freelance">💻 Freelance</option>
                            <option value="Investment">📊 Investment</option>
                            <option value="Gift">🎁 Gift</option>
                            <option value="Other Income">💵 Other</option>
                        </optgroup>
                        <optgroup label="Expense" id="expenseCategories">
                            <option value="Food">🍕 Food</option>
                            <option value="Transport">🚗 Transport</option>
                            <option value="Shopping">🛍️ Shopping</option>
                            <option value="Bills">📃 Bills</option>
                            <option value="Entertainment">🎮 Entertainment</option>
                            <option value="Health">💊 Health</option>
                            <option value="Education">📚 Education</option>
                            <option value="Other Expense">📦 Other</option>
                        </optgroup>
                    </select>
                </div>
                <button class="submit-btn income-btn" id="submitBtn" onclick="addTransaction()">+ Add Income</button>
            </div>

            <div class="transactions-panel">
                <div class="transactions-header">
                    <h2>Transactions</h2>
                    <div class="filter-pills">
                        <button class="filter-pill active" onclick="filterTransactions('all', this)">All</button>
                        <button class="filter-pill" onclick="filterTransactions('income', this)">Income</button>
                        <button class="filter-pill" onclick="filterTransactions('expense', this)">Expense</button>
                    </div>
                </div>
                <ul class="transaction-list" id="transactionList">
                    <div class="empty-state">
                        <span>📭</span>
                        <p>No transactions yet.<br>Add your first one!</p>
                    </div>
                </ul>
            </div>
        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
        let currentType = 'income';
        let currentFilter = 'all';

        const categoryEmojis = {
            'Salary': '💼', 'Freelance': '💻', 'Investment': '📊', 'Gift': '🎁', 'Other Income': '💵',
            'Food': '🍕', 'Transport': '🚗', 'Shopping': '🛍️', 'Bills': '📃',
            'Entertainment': '🎮', 'Health': '💊', 'Education': '📚', 'Other Expense': '📦'
        };

        function setType(type) {
            currentType = type;
            const incomeBtn = document.getElementById('incomeBtn');
            const expenseBtn = document.getElementById('expenseBtn');
            const submitBtn = document.getElementById('submitBtn');

            incomeBtn.className = 'type-btn' + (type === 'income' ? ' active-income' : '');
            expenseBtn.className = 'type-btn' + (type === 'expense' ? ' active-expense' : '');
            submitBtn.className = 'submit-btn ' + (type === 'income' ? 'income-btn' : 'expense-btn');
            submitBtn.textContent = type === 'income' ? '+ Add Income' : '+ Add Expense';
        }

        function addTransaction() {
            const amount = parseFloat(document.getElementById('amount').value);
            const category = document.getElementById('category').value;

            if (!amount || amount <= 0) { shakeElement(document.getElementById('amount')); return; }
            if (!category) { shakeElement(document.getElementById('category')); return; }

            const transaction = {
                id: Date.now(),
                type: currentType,
                amount,
                category,
                date: new Date().toISOString()
            };

            transactions.unshift(transaction);
            saveAndRender();

            document.getElementById('amount').value = '';
            document.getElementById('category').value = '';
        }

        function deleteTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            saveAndRender();
        }

        function filterTransactions(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            renderList();
        }

        function saveAndRender() {
            localStorage.setItem('transactions', JSON.stringify(transactions));
            renderSummary();
            renderList();
        }

        function renderSummary() {
            const totalIncome = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
            const totalExpense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
            const balance = totalIncome - totalExpense;

            document.getElementById('totalIncome').textContent = '₹' + totalIncome.toLocaleString('en-IN');
            document.getElementById('totalExpense').textContent = '₹' + totalExpense.toLocaleString('en-IN');
            document.getElementById('balance').textContent = '₹' + balance.toLocaleString('en-IN');
        }

        function renderList() {
            const list = document.getElementById('transactionList');
            const filtered = currentFilter === 'all'
                ? transactions
                : transactions.filter(t => t.type === currentFilter);

            if (filtered.length === 0) {
                list.innerHTML = `<div class="empty-state"><span>📭</span><p>No transactions yet.<br>Add your first one!</p></div>`;
                return;
            }

            list.innerHTML = filtered.map(t => {
                const emoji = categoryEmojis[t.category] || '💰';
                const sign = t.type === 'income' ? '+' : '-';
                return `
                    <li class="transaction-item">
                        <div class="transaction-left">
                            <div class="transaction-icon ${t.type}-icon">${emoji}</div>
                            <div>
                                <div class="transaction-category">${t.category}</div>
                                <div class="transaction-type">${t.type === 'income' ? 'Income' : 'Expense'} · ${new Date(t.date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' })}</div>
                            </div>
                        </div>
                        <div class="transaction-right">
                            <div class="transaction-amount ${t.type}-amt">${sign}₹${t.amount.toLocaleString('en-IN')}</div>
                            <button class="delete-btn" onclick="deleteTransaction(${t.id})" title="Delete">🗑</button>
                        </div>
                    </li>
                `;
            }).join('');
        }

        function shakeElement(el) {
            el.style.animation = 'none';
            el.offsetHeight;
            el.style.animation = 'shake 0.4s ease';
            setTimeout(() => el.style.animation = '', 400);
        }

        const shakeStyle = document.createElement('style');
        shakeStyle.textContent = `@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }`;
        document.head.appendChild(shakeStyle);

        // Init
        renderSummary();
        renderList();
    </script>
</body>
</html>
