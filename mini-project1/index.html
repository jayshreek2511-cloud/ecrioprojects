<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Calculator</title>
    <meta name="description" content="A beautiful, modern calculator with history tracking and keyboard support.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a1a;
            overflow: hidden;
            position: relative;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120, 80, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 100, 150, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(60, 200, 255, 0.08) 0%, transparent 50%);
            animation: bgFloat 15s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, -2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }

        .app-container {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 24px;
            align-items: flex-start;
            padding: 20px;
        }

        /* Calculator */
        .calculator {
            width: 340px;
            background: rgba(20, 20, 40, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 
                0 25px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset;
        }

        .calc-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .calc-header h1 {
            font-size: 18px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 0.5px;
        }

        .calc-header p {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 4px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Display */
        .display {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            overflow: hidden;
        }

        .display .expression {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            min-height: 20px;
            word-break: break-all;
            text-align: right;
            width: 100%;
            transition: color 0.2s;
        }

        .display .result {
            font-size: 36px;
            font-weight: 300;
            color: #fff;
            margin-top: 8px;
            word-break: break-all;
            text-align: right;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .display .result.pop {
            animation: resultPop 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes resultPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Buttons grid */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .btn {
            height: 58px;
            border: none;
            border-radius: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 14px;
            opacity: 0;
            transition: opacity 0.15s;
            background: radial-gradient(circle at center, rgba(255,255,255,0.2) 0%, transparent 70%);
        }

        .btn:active::after { opacity: 1; }
        .btn:active { transform: scale(0.95); }

        .btn-number {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }
        .btn-number:hover { background: rgba(255, 255, 255, 0.14); }

        .btn-operator {
            background: rgba(120, 80, 255, 0.25);
            color: #b8a0ff;
        }
        .btn-operator:hover { background: rgba(120, 80, 255, 0.4); }

        .btn-function {
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
        }
        .btn-function:hover { background: rgba(255, 255, 255, 0.1); }

        .btn-equals {
            background: linear-gradient(135deg, #7850ff, #c850c0);
            color: #fff;
            font-size: 22px;
            box-shadow: 0 4px 20px rgba(120, 80, 255, 0.4);
        }
        .btn-equals:hover {
            box-shadow: 0 6px 30px rgba(120, 80, 255, 0.6);
            transform: translateY(-1px);
        }
        .btn-equals:active { transform: scale(0.95) translateY(0); }

        .btn-wide { grid-column: span 2; }

        /* History Panel */
        .history-panel {
            width: 280px;
            background: rgba(20, 20, 40, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 24px;
            max-height: 560px;
            display: flex;
            flex-direction: column;
            box-shadow: 
                0 25px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .history-header h2 {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .clear-history {
            background: none;
            border: none;
            color: rgba(255, 100, 150, 0.7);
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .clear-history:hover {
            background: rgba(255, 100, 150, 0.1);
            color: rgba(255, 100, 150, 1);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }

        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-track { background: transparent; }
        .history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        .history-item {
            padding: 12px 14px;
            border-radius: 12px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s;
            animation: slideIn 0.3s ease;
        }

        .history-item:hover { background: rgba(255, 255, 255, 0.06); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .history-expr {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.35);
        }

        .history-result {
            font-size: 18px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
            margin-top: 2px;
        }

        .history-empty {
            text-align: center;
            color: rgba(255, 255, 255, 0.2);
            font-size: 13px;
            margin-top: 60px;
        }

        .history-empty span {
            font-size: 32px;
            display: block;
            margin-bottom: 12px;
        }

        /* Keyboard hint */
        .keyboard-hint {
            text-align: center;
            margin-top: 12px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 0.5px;
        }

        @media (max-width: 700px) {
            .app-container { flex-direction: column; align-items: center; }
            .history-panel { width: 340px; max-height: 300px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="calculator">
            <div class="calc-header">
                <h1>Smart Calculator</h1>
                <p>Mini Project 1</p>
            </div>

            <div class="display">
                <div class="expression" id="expression"></div>
                <div class="result" id="result">0</div>
            </div>

            <div class="buttons">
                <button class="btn btn-function" onclick="clearAll()">AC</button>
                <button class="btn btn-function" onclick="toggleSign()">±</button>
                <button class="btn btn-function" onclick="percent()">%</button>
                <button class="btn btn-operator" onclick="setOperator('÷')">÷</button>

                <button class="btn btn-number" onclick="appendNumber('7')">7</button>
                <button class="btn btn-number" onclick="appendNumber('8')">8</button>
                <button class="btn btn-number" onclick="appendNumber('9')">9</button>
                <button class="btn btn-operator" onclick="setOperator('×')">×</button>

                <button class="btn btn-number" onclick="appendNumber('4')">4</button>
                <button class="btn btn-number" onclick="appendNumber('5')">5</button>
                <button class="btn btn-number" onclick="appendNumber('6')">6</button>
                <button class="btn btn-operator" onclick="setOperator('−')">−</button>

                <button class="btn btn-number" onclick="appendNumber('1')">1</button>
                <button class="btn btn-number" onclick="appendNumber('2')">2</button>
                <button class="btn btn-number" onclick="appendNumber('3')">3</button>
                <button class="btn btn-operator" onclick="setOperator('+')">+</button>

                <button class="btn btn-number btn-wide" onclick="appendNumber('0')">0</button>
                <button class="btn btn-number" onclick="appendDot()">.</button>
                <button class="btn btn-equals" onclick="calculate()">=</button>
            </div>

            <div class="keyboard-hint">⌨ Keyboard supported</div>
        </div>

        <div class="history-panel">
            <div class="history-header">
                <h2>History</h2>
                <button class="clear-history" onclick="clearHistory()">Clear</button>
            </div>
            <div class="history-list" id="historyList">
                <div class="history-empty">
                    <span>🕐</span>
                    Your calculations<br>will appear here
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentInput = '0';
        let previousInput = '';
        let operator = null;
        let shouldResetScreen = false;
        let history = [];

        const resultEl = document.getElementById('result');
        const exprEl = document.getElementById('expression');
        const historyListEl = document.getElementById('historyList');

        function updateDisplay() {
            resultEl.textContent = currentInput;
        }

        function appendNumber(num) {
            if (currentInput === '0' && num !== '.') currentInput = '';
            if (shouldResetScreen) {
                currentInput = '';
                shouldResetScreen = false;
            }
            if (currentInput.length > 15) return;
            currentInput += num;
            updateDisplay();
        }

        function appendDot() {
            if (shouldResetScreen) { currentInput = '0'; shouldResetScreen = false; }
            if (currentInput.includes('.')) return;
            currentInput += '.';
            updateDisplay();
        }

        function setOperator(op) {
            if (operator && !shouldResetScreen) calculate();
            previousInput = currentInput;
            operator = op;
            shouldResetScreen = true;
            exprEl.textContent = `${previousInput} ${operator}`;
        }

        function calculate() {
            if (!operator || shouldResetScreen) return;
            const prev = parseFloat(previousInput);
            const curr = parseFloat(currentInput);
            let result;

            switch (operator) {
                case '+': result = prev + curr; break;
                case '−': result = prev - curr; break;
                case '×': result = prev * curr; break;
                case '÷':
                    if (curr === 0) {
                        currentInput = 'Error';
                        exprEl.textContent = 'Cannot divide by zero';
                        operator = null;
                        updateDisplay();
                        resultEl.classList.add('pop');
                        setTimeout(() => resultEl.classList.remove('pop'), 300);
                        return;
                    }
                    result = prev / curr;
                    break;
                default: return;
            }

            const expression = `${previousInput} ${operator} ${currentInput}`;
            result = parseFloat(result.toFixed(10));
            
            addToHistory(expression, result);

            exprEl.textContent = expression;
            currentInput = result.toString();
            operator = null;
            shouldResetScreen = true;
            updateDisplay();
            resultEl.classList.add('pop');
            setTimeout(() => resultEl.classList.remove('pop'), 300);
        }

        function clearAll() {
            currentInput = '0';
            previousInput = '';
            operator = null;
            shouldResetScreen = false;
            exprEl.textContent = '';
            updateDisplay();
        }

        function toggleSign() {
            if (currentInput === '0' || currentInput === 'Error') return;
            currentInput = (parseFloat(currentInput) * -1).toString();
            updateDisplay();
        }

        function percent() {
            if (currentInput === 'Error') return;
            currentInput = (parseFloat(currentInput) / 100).toString();
            updateDisplay();
        }

        function addToHistory(expr, result) {
            history.unshift({ expr, result });
            if (history.length > 20) history.pop();
            renderHistory();
        }

        function renderHistory() {
            if (history.length === 0) {
                historyListEl.innerHTML = `<div class="history-empty"><span>🕐</span>Your calculations<br>will appear here</div>`;
                return;
            }
            historyListEl.innerHTML = history.map((item, i) => `
                <div class="history-item" onclick="loadHistory(${i})">
                    <div class="history-expr">${item.expr} =</div>
                    <div class="history-result">${item.result}</div>
                </div>
            `).join('');
        }

        function loadHistory(index) {
            currentInput = history[index].result.toString();
            shouldResetScreen = true;
            updateDisplay();
            resultEl.classList.add('pop');
            setTimeout(() => resultEl.classList.remove('pop'), 300);
        }

        function clearHistory() {
            history = [];
            renderHistory();
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
            else if (e.key === '.') appendDot();
            else if (e.key === '+') setOperator('+');
            else if (e.key === '-') setOperator('−');
            else if (e.key === '*') setOperator('×');
            else if (e.key === '/') { e.preventDefault(); setOperator('÷'); }
            else if (e.key === 'Enter' || e.key === '=') calculate();
            else if (e.key === 'Escape') clearAll();
            else if (e.key === 'Backspace') {
                if (currentInput.length > 1) currentInput = currentInput.slice(0, -1);
                else currentInput = '0';
                updateDisplay();
            }
        });
    </script>
</body>
</html>
